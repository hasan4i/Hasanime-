<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HasAnime — Anime Ansiklopedisi</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070711;
  --surface: #0f0f1e;
  --card: #13132a;
  --border: rgba(255,255,255,0.07);
  --accent: #e63946;
  --gold: #ffd60a;
  --cyan: #00f5d4;
  --purple: #7b2fff;
  --text: #eaeaea;
  --muted: rgba(234,234,234,0.5);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(123,47,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(123,47,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none; z-index:0;
}

/* HEADER */
header {
  position:sticky; top:0; z-index:100;
  background:rgba(7,7,17,0.9);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  display:flex; align-items:center; justify-content:space-between;
  height:64px;
}
.logo {
  font-family:'Orbitron',monospace;
  font-size:1.4rem; font-weight:900;
  background:linear-gradient(135deg, var(--accent), var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.logo span { -webkit-text-fill-color:var(--cyan); }
nav { display:flex; gap:24px; }
nav a {
  color:var(--muted); text-decoration:none;
  font-size:0.85rem; font-weight:700;
  letter-spacing:0.08em; text-transform:uppercase;
  transition:color 0.2s; cursor:pointer;
}
nav a:hover { color:var(--cyan); }

main { position:relative; z-index:1; }

/* HERO */
.hero {
  padding:80px 24px 60px;
  text-align:center; position:relative; overflow:hidden;
}
.hero-glow {
  position:absolute; top:-100px; left:50%; transform:translateX(-50%);
  width:600px; height:400px;
  background:radial-gradient(ellipse, rgba(230,57,70,0.15) 0%, transparent 70%);
  pointer-events:none;
}
.hero h1 {
  font-family:'Orbitron',monospace;
  font-size:clamp(2rem,6vw,4rem); font-weight:900; line-height:1.1; margin-bottom:12px;
}
.hero h1 em { color:var(--accent); font-style:normal; }
.hero p { color:var(--muted); font-size:1rem; margin-bottom:40px; }

/* SEARCH */
.search-wrap { max-width:640px; margin:0 auto; position:relative; }
.search-wrap input {
  width:100%; background:var(--card);
  border:2px solid rgba(255,255,255,0.1); border-radius:100px;
  padding:18px 60px 18px 28px;
  color:var(--text); font-size:1rem;
  font-family:'Noto Sans JP',sans-serif; outline:none;
  transition:border-color 0.3s, box-shadow 0.3s;
}
.search-wrap input:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(230,57,70,0.15); }
.search-wrap input::placeholder { color:var(--muted); }
.search-btn {
  position:absolute; right:8px; top:50%; transform:translateY(-50%);
  background:var(--accent); border:none; border-radius:100px;
  width:44px; height:44px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:1.1rem;
  transition:background 0.2s;
}
.search-btn:hover { background:#c1121f; }

.search-results {
  position:absolute; top:calc(100% + 8px); left:0; right:0;
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; overflow:hidden; display:none; z-index:50;
  box-shadow:0 20px 60px rgba(0,0,0,0.5); max-height:400px; overflow-y:auto;
}
.search-results.show { display:block; }
.search-result-item {
  display:flex; align-items:center; gap:14px;
  padding:12px 20px; cursor:pointer; transition:background 0.2s;
  border-bottom:1px solid var(--border);
}
.search-result-item:last-child { border-bottom:none; }
.search-result-item:hover { background:rgba(255,255,255,0.05); }
.search-result-img {
  width:40px; height:56px; object-fit:cover; border-radius:8px;
  background:var(--surface); flex-shrink:0;
}
.search-result-info h4 { font-size:0.9rem; font-weight:700; margin-bottom:3px; }
.search-result-info p { font-size:0.75rem; color:var(--muted); }
.search-result-score { margin-left:auto; color:var(--gold); font-weight:700; font-size:0.9rem; flex-shrink:0; }

/* LOADING */
.loading {
  display:flex; align-items:center; justify-content:center;
  gap:12px; padding:60px 24px; color:var(--muted); font-size:0.9rem;
}
.spinner {
  width:28px; height:28px; border-radius:50%;
  border:3px solid rgba(255,255,255,0.1);
  border-top-color:var(--accent);
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* SECTION */
section { padding:60px 24px; max-width:1200px; margin:0 auto; }
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
.section-title {
  font-family:'Orbitron',monospace; font-size:1.1rem; font-weight:700;
  display:flex; align-items:center; gap:10px;
}
.dot { width:8px; height:8px; border-radius:50%; animation:pulse 2s ease infinite; }
.dot-red { background:var(--accent); box-shadow:0 0 8px var(--accent); }
.dot-gold { background:var(--gold); box-shadow:0 0 8px var(--gold); }
.dot-cyan { background:var(--cyan); box-shadow:0 0 8px var(--cyan); }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

/* TABS */
.tabs { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
.tab {
  padding:8px 20px; border-radius:100px;
  font-size:0.8rem; font-weight:700; letter-spacing:0.06em;
  cursor:pointer; transition:all 0.2s;
  border:2px solid var(--border); color:var(--muted); background:transparent;
}
.tab.active { border-color:var(--accent); color:var(--accent); background:rgba(230,57,70,0.1); }

/* TOP GRID */
.top-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(155px,1fr));
  gap:16px;
}
.anime-card {
  background:var(--card); border-radius:16px; overflow:hidden;
  border:1px solid var(--border); cursor:pointer;
  transition:transform 0.3s, border-color 0.3s, box-shadow 0.3s;
  position:relative;
}
.anime-card:hover { transform:translateY(-8px); border-color:rgba(230,57,70,0.4); box-shadow:0 16px 40px rgba(0,0,0,0.4); }
.anime-card-rank {
  position:absolute; top:8px; left:8px; z-index:2;
  font-family:'Orbitron',monospace; font-size:0.7rem; font-weight:900;
  padding:3px 10px; border-radius:100px;
}
.rank-gold { background:var(--gold); color:var(--bg); }
.rank-silver { background:#c0c0c0; color:var(--bg); }
.rank-bronze { background:#cd7f32; color:white; }
.rank-default { background:var(--accent); color:white; }
.anime-thumb {
  width:100%; aspect-ratio:2/3; object-fit:cover;
  background:var(--surface); display:block;
}
.anime-thumb-placeholder {
  width:100%; aspect-ratio:2/3;
  background:var(--surface);
  display:flex; align-items:center; justify-content:center;
  font-size:4rem;
}
.anime-card-info { padding:10px; }
.anime-card-info h3 { font-size:0.8rem; font-weight:700; margin-bottom:5px; line-height:1.3; }
.anime-meta { display:flex; align-items:center; justify-content:space-between; }
.anime-score { display:flex; align-items:center; gap:3px; color:var(--gold); font-size:0.78rem; font-weight:700; }
.anime-genre { font-size:0.66rem; color:var(--muted); background:rgba(255,255,255,0.05); padding:2px 7px; border-radius:100px; }

/* TRENDING */
.trending-list { display:flex; flex-direction:column; gap:12px; }
.trending-item {
  display:flex; align-items:center; gap:14px;
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:12px 16px;
  cursor:pointer; transition:all 0.25s; position:relative; overflow:hidden;
}
.trending-item::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; background:var(--accent);
  transform:scaleY(0); transition:transform 0.3s;
}
.trending-item:hover { background:rgba(255,255,255,0.04); transform:translateX(4px); }
.trending-item:hover::before { transform:scaleY(1); }
.trending-num {
  font-family:'Orbitron',monospace; font-size:1.3rem; font-weight:900;
  color:rgba(255,255,255,0.1); min-width:36px;
}
.trending-item:nth-child(1) .trending-num { color:var(--gold); }
.trending-item:nth-child(2) .trending-num { color:#c0c0c0; }
.trending-item:nth-child(3) .trending-num { color:#cd7f32; }
.trending-img {
  width:48px; height:64px; object-fit:cover; border-radius:8px;
  background:var(--surface); flex-shrink:0;
}
.trending-img-placeholder {
  width:48px; height:64px; border-radius:8px;
  background:var(--surface); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:1.8rem;
}
.trending-info { flex:1; min-width:0; }
.trending-info h3 { font-size:0.92rem; font-weight:700; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.trending-info p { font-size:0.75rem; color:var(--muted); }
.trending-badges { display:flex; gap:5px; margin-top:5px; flex-wrap:wrap; }
.badge { font-size:0.65rem; font-weight:700; padding:2px 9px; border-radius:100px; }
.badge-red { background:rgba(230,57,70,0.15); color:var(--accent); border:1px solid rgba(230,57,70,0.3); }
.badge-cyan { background:rgba(0,245,212,0.1); color:var(--cyan); border:1px solid rgba(0,245,212,0.2); }
.badge-gold { background:rgba(255,214,10,0.1); color:var(--gold); border:1px solid rgba(255,214,10,0.2); }
.trending-score { text-align:right; flex-shrink:0; }
.trending-score .score { font-family:'Orbitron',monospace; font-size:1rem; font-weight:900; color:var(--gold); }
.trending-score .label { font-size:0.65rem; color:var(--muted); }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.85); backdrop-filter:blur(10px);
  z-index:200; display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.show { display:flex; }
.modal {
  background:var(--surface); border:1px solid rgba(255,255,255,0.1);
  border-radius:24px; width:100%; max-width:880px;
  max-height:90vh; overflow-y:auto; position:relative;
  animation:modalIn 0.3s ease;
}
@keyframes modalIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
.modal-close {
  position:sticky; top:16px; float:right; margin:16px 16px 0 0;
  background:rgba(255,255,255,0.1); border:none; border-radius:50%;
  width:36px; height:36px; color:var(--text); font-size:1rem;
  cursor:pointer; z-index:10; display:flex; align-items:center; justify-content:center;
  transition:background 0.2s;
}
.modal-close:hover { background:var(--accent); }

.modal-banner {
  width:100%; height:220px; object-fit:cover; object-position:top;
  display:block; border-radius:24px 24px 0 0;
}
.modal-banner-placeholder {
  width:100%; height:160px;
  background:linear-gradient(135deg, #1a0a2e, #0d1b2a);
  border-radius:24px 24px 0 0;
  display:flex; align-items:center; justify-content:center; font-size:5rem;
}

.modal-hero {
  display:flex; gap:24px; padding:24px; margin-top:-60px; position:relative;
}
.modal-poster {
  width:140px; min-width:140px; height:200px;
  object-fit:cover; border-radius:14px;
  border:3px solid var(--surface);
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
  flex-shrink:0; background:var(--card);
}
.modal-poster-placeholder {
  width:140px; min-width:140px; height:200px;
  border-radius:14px; background:var(--card);
  border:3px solid var(--surface);
  display:flex; align-items:center; justify-content:center; font-size:4rem;
  flex-shrink:0;
}
.modal-meta { flex:1; padding-top:64px; }
.modal-meta h2 { font-family:'Orbitron',monospace; font-size:clamp(1.1rem,3vw,1.6rem); font-weight:900; margin-bottom:4px; }
.modal-meta .jp { color:var(--muted); font-size:0.85rem; margin-bottom:14px; }
.modal-scores { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.score-box { background:var(--card); border-radius:12px; padding:10px 18px; text-align:center; border:1px solid var(--border); }
.score-box .val { font-family:'Orbitron',monospace; font-size:1.4rem; font-weight:900; }
.score-box .lbl { font-size:0.68rem; color:var(--muted); margin-top:2px; }
.gold-box .val { color:var(--gold); }
.cyan-box .val { color:var(--cyan); }
.red-box .val { color:var(--accent); }
.modal-tags { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:14px; }
.modal-desc { font-size:0.88rem; color:var(--muted); line-height:1.8; }

.modal-body { padding:0 24px 28px; }
.modal-section-title {
  font-family:'Orbitron',monospace; font-size:0.82rem; font-weight:700;
  color:var(--cyan); letter-spacing:0.1em; text-transform:uppercase;
  margin:24px 0 14px; display:flex; align-items:center; gap:8px;
}
.modal-section-title::after { content:''; flex:1; height:1px; background:linear-gradient(to right,var(--cyan),transparent); opacity:0.3; }

.info-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; }
.info-item { background:var(--card); border-radius:10px; padding:11px; border:1px solid var(--border); }
.info-item .key { font-size:0.65rem; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:3px; }
.info-item .val { font-size:0.88rem; font-weight:700; }

/* CHARACTERS */
.char-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px; }
.char-card {
  background:var(--card); border-radius:14px; overflow:hidden;
  border:1px solid var(--border); cursor:default; transition:all 0.25s;
}
.char-card:hover { border-color:var(--purple); transform:translateY(-4px); }
.char-img { width:100%; height:130px; object-fit:cover; object-position:top; background:var(--surface); display:block; }
.char-img-placeholder {
  width:100%; height:130px; background:var(--surface);
  display:flex; align-items:center; justify-content:center; font-size:3rem;
}
.char-info { padding:10px; }
.char-info h4 { font-size:0.78rem; font-weight:700; margin-bottom:2px; }
.char-info p { font-size:0.68rem; color:var(--muted); }
.char-role {
  font-size:0.62rem; font-weight:700; padding:2px 7px; border-radius:100px;
  display:inline-block; margin-top:5px;
}
.role-main { background:rgba(230,57,70,0.15); color:var(--accent); }
.role-support { background:rgba(123,47,255,0.15); color:#a96fff; }
.role-villain { background:rgba(0,0,0,0.4); color:#ff6b6b; border:1px solid rgba(255,107,107,0.3); }

/* STAT BARS */
.stat-bars { display:flex; flex-direction:column; gap:10px; }
.stat-bar-row { display:flex; align-items:center; gap:12px; }
.stat-bar-label { font-size:0.75rem; color:var(--muted); min-width:90px; text-align:right; }
.stat-bar-track { flex:1; height:6px; background:rgba(255,255,255,0.07); border-radius:100px; overflow:hidden; }
.stat-bar-fill { height:100%; border-radius:100px; background:linear-gradient(to right,var(--accent),var(--gold)); }
.stat-bar-val { font-size:0.75rem; font-weight:700; min-width:36px; }

footer {
  text-align:center; padding:40px 24px;
  border-top:1px solid var(--border);
  color:var(--muted); font-size:0.8rem; position:relative; z-index:1;
}
footer span { color:var(--accent); }

@media(max-width:600px) {
  nav { display:none; }
  .modal-hero { flex-direction:column; margin-top:0; }
  .modal-meta { padding-top:16px; }
  .modal-poster, .modal-poster-placeholder { width:100%; min-width:unset; height:180px; }
  .top-grid { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<header>
  <div class="logo">Has<span>Anime</span></div>
  <nav>
    <a onclick="document.getElementById('top').scrollIntoView({behavior:'smooth'})">Top IMDb</a>
    <a onclick="document.getElementById('trending').scrollIntoView({behavior:'smooth'})">Trend</a>
    <a onclick="document.getElementById('search-section').scrollIntoView({behavior:'smooth'})">Ara</a>
  </nav>
</header>

<main>
  <div class="hero" id="search-section">
    <div class="hero-glow"></div>
    <h1><em>Has</em>Anime 🎌</h1>
    <p>Hasan'ın Anime Ansiklopedisi — Gerçek posterler, karakterler ve puanlar</p>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Anime ara... (örn: Naruto, One Piece, Death Note)" autocomplete="off">
      <button class="search-btn" onclick="doSearch()">🔍</button>
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>

  <section id="top">
    <div class="section-header">
      <div class="section-title"><div class="dot dot-gold"></div>IMDb'ye Göre En İyiler</div>
    </div>
    <div id="topGrid"><div class="loading"><div class="spinner"></div>Animeler yükleniyor...</div></div>
  </section>

  <section id="trending">
    <div class="section-header">
      <div class="section-title"><div class="dot dot-red"></div>Popüler Animeler 🔥</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="loadTrending(this,'bypopularity')">En Popüler</button>
      <button class="tab" onclick="loadTrending(this,'airing')">Yayında</button>
      <button class="tab" onclick="loadTrending(this,'favorite')">Favoriler</button>
    </div>
    <div id="trendingList"><div class="loading"><div class="spinner"></div>Yükleniyor...</div></div>
  </section>
</main>

<footer>
  <p>HasAnime &copy; 2026 — Hasan tarafından <span>♥</span> ile yapıldı · Veriler MyAnimeList'ten alınmaktadır</p>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"><div class="loading" style="min-height:300px"><div class="spinner"></div>Yükleniyor...</div></div>
  </div>
</div>

<script>
const JIKAN = 'https://api.jikan.moe/v4';
const delay = ms => new Promise(r => setTimeout(r, ms));

// Cache
const cache = {};
async function jikan(path) {
  if (cache[path]) return cache[path];
  await delay(400);
  const res = await fetch(JIKAN + path);
  const data = await res.json();
  cache[path] = data;
  return data;
}

// Score rengi
function scoreColor(s) {
  if (s >= 9) return 'var(--cyan)';
  if (s >= 8) return 'var(--gold)';
  if (s >= 7) return 'var(--accent)';
  return 'var(--muted)';
}

function rankClass(i) {
  if (i === 0) return 'rank-gold';
  if (i === 1) return 'rank-silver';
  if (i === 2) return 'rank-bronze';
  return 'rank-default';
}

// TOP IMDb
async function loadTop() {
  try {
    const data = await jikan('/top/anime?limit=12&filter=bypopularity');
    const animes = data.data || [];
    document.getElementById('topGrid').innerHTML = animes.map((a, i) => `
      <div class="anime-card" onclick="openModal(${a.mal_id})">
        <div class="anime-card-rank ${rankClass(i)}">#${i+1}</div>
        ${a.images?.jpg?.large_image_url
          ? `<img class="anime-thumb" src="${a.images.jpg.large_image_url}" alt="${a.title}" loading="lazy">`
          : `<div class="anime-thumb-placeholder">🎌</div>`}
        <div class="anime-card-info">
          <h3>${a.title}</h3>
          <div class="anime-meta">
            <div class="anime-score" style="color:${scoreColor(a.score)}">⭐ ${a.score || '?'}</div>
            <div class="anime-genre">${a.genres?.[0]?.name || 'Anime'}</div>
          </div>
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('topGrid').innerHTML = `<div class="loading">Yüklenemedi 😔 Lütfen sayfayı yenileyin.</div>`;
  }
}

// TRENDING
async function loadTrending(btn, filter) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('trendingList').innerHTML = `<div class="loading"><div class="spinner"></div>Yükleniyor...</div>`;
  try {
    const data = await jikan(`/top/anime?limit=8&filter=${filter}`);
    const animes = data.data || [];
    document.getElementById('trendingList').innerHTML = animes.map((a, i) => `
      <div class="trending-item" onclick="openModal(${a.mal_id})">
        <div class="trending-num">${String(i+1).padStart(2,'0')}</div>
        ${a.images?.jpg?.image_url
          ? `<img class="trending-img" src="${a.images.jpg.image_url}" alt="${a.title}" loading="lazy">`
          : `<div class="trending-img-placeholder">🎌</div>`}
        <div class="trending-info">
          <h3>${a.title}</h3>
          <p>${a.title_japanese || ''} · ${a.year || ''} · ${a.studios?.[0]?.name || ''}</p>
          <div class="trending-badges">
            ${a.genres?.slice(0,2).map(g=>`<span class="badge badge-red">${g.name}</span>`).join('') || ''}
            <span class="badge badge-cyan">${a.status || ''}</span>
            ${a.episodes ? `<span class="badge badge-gold">${a.episodes} Bölüm</span>` : ''}
          </div>
        </div>
        <div class="trending-score">
          <div class="score" style="color:${scoreColor(a.score)}">⭐${a.score || '?'}</div>
          <div class="label">IMDb</div>
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('trendingList').innerHTML = `<div class="loading">Yüklenemedi 😔</div>`;
  }
}

// MODAL
async function openModal(id) {
  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  document.getElementById('modalContent').innerHTML = `<div class="loading" style="min-height:300px"><div class="spinner"></div>Anime bilgileri yükleniyor...</div>`;

  try {
    const [animeRes, charRes] = await Promise.all([
      jikan(`/anime/${id}/full`),
      jikan(`/anime/${id}/characters`)
    ]);
    const a = animeRes.data;
    const chars = (charRes.data || []).slice(0, 8);

    const genres = a.genres?.map(g => `<span class="badge badge-red">${g.name}</span>`).join('') || '';
    const themes = a.themes?.slice(0,2).map(t => `<span class="badge badge-cyan">${t.name}</span>`).join('') || '';

    document.getElementById('modalContent').innerHTML = `
      ${a.images?.jpg?.large_image_url
        ? `<img class="modal-banner" src="${a.images.jpg.large_image_url}" alt="${a.title}">`
        : `<div class="modal-banner-placeholder">🎌</div>`}
      <div class="modal-hero">
        ${a.images?.jpg?.large_image_url
          ? `<img class="modal-poster" src="${a.images.jpg.large_image_url}" alt="${a.title}">`
          : `<div class="modal-poster-placeholder">🎌</div>`}
        <div class="modal-meta">
          <h2>${a.title}</h2>
          <div class="jp">${a.title_japanese || ''}</div>
          <div class="modal-scores">
            <div class="score-box gold-box"><div class="val">⭐ ${a.score || '?'}</div><div class="lbl">IMDb Puanı</div></div>
            <div class="score-box cyan-box"><div class="val">${a.members ? (a.members/1000).toFixed(0)+'K' : '?'}</div><div class="lbl">Üye</div></div>
            <div class="score-box red-box"><div class="val">${a.rank ? '#'+a.rank : '?'}</div><div class="lbl">Sıralama</div></div>
          </div>
          <div class="modal-tags">${genres}${themes}</div>
          <p class="modal-desc">${a.synopsis ? a.synopsis.replace('[Written by MAL Rewrite]','').trim().substring(0, 400) + '...' : 'Açıklama bulunamadı.'}</p>
        </div>
      </div>

      <div class="modal-body">
        <div class="modal-section-title">📋 Anime Bilgileri</div>
        <div class="info-grid">
          <div class="info-item"><div class="key">Tür</div><div class="val">${a.type || '?'}</div></div>
          <div class="info-item"><div class="key">Bölüm</div><div class="val">${a.episodes || '?'}</div></div>
          <div class="info-item"><div class="key">Durum</div><div class="val">${a.status || '?'}</div></div>
          <div class="info-item"><div class="key">Yayın</div><div class="val">${a.year || '?'}</div></div>
          <div class="info-item"><div class="key">Stüdyo</div><div class="val">${a.studios?.[0]?.name || '?'}</div></div>
          <div class="info-item"><div class="key">Süre</div><div class="val">${a.duration || '?'}</div></div>
          <div class="info-item"><div class="key">Yaş Sınırı</div><div class="val">${a.rating || '?'}</div></div>
          <div class="info-item"><div class="key">Popülerlik</div><div class="val">#${a.popularity || '?'}</div></div>
        </div>

        <div class="modal-section-title">📊 Değerlendirme</div>
        <div class="stat-bars">
          ${[
            ['IMDb Puanı', Math.round((a.score||0)*10)],
            ['Popülerlik', Math.max(0,100-Math.round((a.popularity||100)/100))],
            ['Favori', Math.min(100,Math.round((a.favorites||0)/5000))],
            ['Üye Sayısı', Math.min(100,Math.round((a.members||0)/20000))],
          ].map(([l,v])=>`
          <div class="stat-bar-row">
            <div class="stat-bar-label">${l}</div>
            <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${v}%"></div></div>
            <div class="stat-bar-val">${v}</div>
          </div>`).join('')}
        </div>

        <div class="modal-section-title">👥 Karakterler</div>
        ${chars.length ? `
        <div class="char-grid">
          ${chars.map(c => `
          <div class="char-card">
            ${c.character?.images?.jpg?.image_url
              ? `<img class="char-img" src="${c.character.images.jpg.image_url}" alt="${c.character.name}" loading="lazy">`
              : `<div class="char-img-placeholder">👤</div>`}
            <div class="char-info">
              <h4>${c.character?.name || '?'}</h4>
              <p>${c.voice_actors?.[0]?.person?.name || ''}</p>
              <span class="char-role ${c.role==='Main'?'role-main':c.role==='Supporting'?'role-support':'role-villain'}">
                ${c.role==='Main'?'Ana Karakter':c.role==='Supporting'?'Destek':'Antagonist'}
              </span>
            </div>
          </div>`).join('')}
        </div>` : '<p style="color:var(--muted);font-size:0.85rem">Karakter bilgisi bulunamadı.</p>'}
      </div>
    `;
  } catch(e) {
    document.getElementById('modalContent').innerHTML = `<div class="loading" style="min-height:200px">Yüklenemedi 😔 Lütfen tekrar deneyin.</div>`;
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

// SEARCH
let searchTimeout;
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  const q = searchInput.value.trim();
  if (!q) { searchResults.classList.remove('show'); return; }
  searchTimeout = setTimeout(() => fetchSearch(q), 500);
});

async function fetchSearch(q) {
  searchResults.innerHTML = `<div class="search-result-item"><div class="search-result-info"><h4>Aranıyor...</h4></div></div>`;
  searchResults.classList.add('show');
  try {
    const data = await fetch(`${JIKAN}/anime?q=${encodeURIComponent(q)}&limit=6`).then(r=>r.json());
    const results = data.data || [];
    if (!results.length) {
      searchResults.innerHTML = `<div class="search-result-item"><div class="search-result-info"><h4>Sonuç bulunamadı 😔</h4><p>"${q}" için eşleşme yok</p></div></div>`;
    } else {
      searchResults.innerHTML = results.map(a => `
        <div class="search-result-item" onclick="searchPick(${a.mal_id})">
          ${a.images?.jpg?.small_image_url
            ? `<img class="search-result-img" src="${a.images.jpg.small_image_url}" alt="${a.title}">`
            : `<div class="search-result-img" style="display:flex;align-items:center;justify-content:center;font-size:1.4rem">🎌</div>`}
          <div class="search-result-info">
            <h4>${a.title}</h4>
            <p>${a.title_japanese || ''} · ${a.year || ''} · ${a.episodes ? a.episodes+' bölüm' : ''}</p>
          </div>
          <div class="search-result-score">⭐ ${a.score || '?'}</div>
        </div>`).join('');
    }
  } catch(e) {
    searchResults.innerHTML = `<div class="search-result-item"><div class="search-result-info"><h4>Hata oluştu 😔</h4></div></div>`;
  }
}

function doSearch() { fetchSearch(searchInput.value.trim()); }

function searchPick(id) {
  searchResults.classList.remove('show');
  searchInput.value = '';
  openModal(id);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) searchResults.classList.remove('show');
});
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
  if (e.key === 'Escape') searchResults.classList.remove('show');
});

// INIT
loadTop();
loadTrending(document.querySelector('.tab'), 'bypopularity');
</script>
</body>
</html>
